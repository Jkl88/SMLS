; PlatformIO Project Configuration
; Smart Motion Light System (SMLS) — два таргета: Master и LED Controller

[env]
platform = esp32
framework = arduino
monitor_speed = 115200
extra_scripts =
    pre:scripts/pre_build_config.py
    scripts/post_build_package.py

; ========== Master — основной контроллер (датчики, OLED, WEB, LittleFS, ESP-NOW) ==========
[env:master]
board = esp32dev
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
build_src_filter = +<master/>
build_flags =
    -I include
    -D SMLS_MASTER=1
    ; I2C (MPU6050 x2, SSD1306)
    -D I2C_SDA=21
    -D I2C_SCL=22
    ; Датчик Холла KY-024
    -D PIN_HALL=34
    ; Джойстик KY-023 (VRx, VRy, SW)
    -D PIN_JOY_X=32
    -D PIN_JOY_Y=33
    -D PIN_JOY_SW=25
    ; Кнопки без фиксации
    -D PIN_BTN_1=0
    -D PIN_BTN_2=2
    ; Светодиоды индикации
    -D PIN_LED_1=4
    -D PIN_LED_2=15
    ; Кнопка калибровки — используем одну из кнопок (BTN_1)
    -D PIN_BTN_CALIB=0
lib_deps =
    https://github.com/Jkl88/TKWifiManager.git
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.9
    me-no-dev/ESP Async WebServer@^1.2.3
    me-no-dev/AsyncTCP@^1.1.1
    bblanchon/ArduinoJson@^6.21.3
    adafruit/Adafruit MPU6050@^2.3.2
build_src_filter = +<master/>

; Конечный таргет Master для платы ESP32 Dev Module (пины по умолчанию)
[env:esp32dev_master]
extends = env:master
board = esp32dev

; ========== LED Controller — приём ESP-NOW, управление лентой WS2812B ==========
[env:led_controller]
board = esp32dev
build_src_filter = +<led_controller/>
build_flags =
    -I include
    -D SMLS_LED_CONTROLLER=1
    ; Лента WS2812B (212 диодов)
    -D LED_PIN=4
    -D LED_COUNT=212
lib_deps =
    fastled/FastLED@^3.6.0

; Конечный таргет LED Controller для платы ESP32 Dev Module
[env:esp32dev_led_controller]
extends = env:led_controller
board = esp32dev
